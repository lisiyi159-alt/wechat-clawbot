name: Deploy to GitHub Pages

# 把静态看板发布到 GitHub Pages。首次运行会自动开启 Pages（enablement: true）。
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只保留一个部署，新的会取消进行中的旧部署
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 纯静态站点，整个仓库根目录即站点根（入口 index.html）
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
